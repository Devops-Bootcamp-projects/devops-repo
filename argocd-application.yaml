apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devlinks-gitops-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Devops-Bootcamp-projects/devops-repo
    targetRevision: HEAD # Using your 'argocd' branch
    path:               # The folder where your manifests live
  
  destination: 
    server: https://kubernetes.default.svc
    namespace: devops-project # Matches your backend/frontend manifests

  syncPolicy:
    syncOptions:
    - CreateNamespace=true

    automated:
      selfHeal: true # Automatically fixes manual changes to the cluster
      prune: true    # Deletes resources in K8s if they are deleted from Git