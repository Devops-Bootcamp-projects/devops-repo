services:
  frontend:
    
    image: hammedbabatunde/devopsbootcamp-frontend:1.5
    container_name: linker-frontend
    command: npx next start -H 0.0.0.0 -p 3000
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://${PUBLIC_IP_ADDRESS}:3001/api
    depends_on:
      - backend

  backend:
    image: hammedbabatunde/devopsbootcamp-backend:1.0
    container_name: linker-backend
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      - FRONTEND_ORIGIN=http://${PUBLIC_IP_ADDRESS}:3000
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    container_name: linker-postgres
    env_file: .env 
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      # Use double $$ to ensure the container shell evaluates the variables
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: